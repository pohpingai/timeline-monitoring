<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Monitoring</title>
  <!-- Styling: Vanilla HTML + Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { margin: 0; height: 100%; overflow: hidden; background-color: #f8fafc; font-family: 'Inter', sans-serif; }
    .gantt-grid { background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px); background-size: 30px 100%; }
    
    .table-cell { padding: 4px 8px; border-right: 1px solid #e2e8f0; display: flex; align-items: center; white-space: nowrap; overflow: hidden; font-size: 11px; }
    .col-name { width: 220px; font-weight: 500; font-size: 12px; }
    .col-pic { width: 70px; justify-content: center; }
    .col-market { width: 80px; justify-content: center; }
    .col-date { width: 95px; justify-content: center; }
    
    .group-header { background: #f1f5f9; padding: 10px 12px; font-weight: bold; font-size: 11px; color: #475569; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; }
    .task-row { border-bottom: 1px solid #f1f5f9; background: white; height: 42px; display: flex; transition: background 0.2s; }
    .task-row:hover { background: #f8fafc; }
    
    .input-clean { border: none; background: transparent; width: 100%; outline: none; font-family: inherit; }
    .input-clean:focus { background: white; outline: 1px solid #93c5fd; border-radius: 2px; }
    .date-input { text-align: center; color: #64748b; cursor: pointer; }
    ::-webkit-calendar-picker-indicator { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; }
  </style>
</head>
<body class="flex flex-col">

  <!-- Header -->
  <header class="h-16 bg-white border-b border-slate-200 flex flex-col sm:flex-row items-center px-6 justify-between shrink-0 z-50 shadow-sm relative">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">TM</div>
      <h1 class="text-lg font-bold text-slate-800">Timeline Monitoring</h1>
    </div>
    <div class="flex items-center gap-3 mt-2 sm:mt-0">
      <label class="font-semibold text-xs text-slate-500 uppercase tracking-wide">Market Filter:</label>
      <select id="marketFilter" class="border border-slate-300 rounded-md px-3 py-1.5 bg-slate-50 text-sm font-medium text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer shadow-sm" onchange="render()">
        <option value="ALL">All Markets</option>
        <option value="MY">Malaysia</option>
        <option value="SG">Singapore</option>
        <option value="VN">Vietnam</option>
        <option value="ID">Indonesia</option>
        <option value="TH">Thailand</option>
      </select>
    </div>
  </header>

  <!-- Analytics Summary -->
  <div id="analytics" class="flex gap-4 p-4 shrink-0 bg-white border-b border-slate-200 z-40 relative">
     <!-- Analytics Injected via JS -->
  </div>

  <!-- Main Tracking Container -->
  <div class="flex-1 overflow-auto bg-slate-100" id="main-scroll">
    <div class="flex min-w-max relative shadow-[0_0_10px_rgba(0,0,0,0.05)] m-4" id="app-container">
      <!-- Data Injected via JS -->
    </div>
  </div>

  <script>
    // 1. Data State (Replaces React useState)
    const INITIAL_TASKS = [
      { id: '1', group: 'NPR GATE', name: 'Charter Preparation', pic: 'Prj.Own', tag: 'ALL', fcstStart: '2026-01-02', fcstEnd: '2026-01-05', actStart: '', actEnd: '' },
      { id: '2', group: 'NPR GATE', name: 'Feeder Submission & Appr.', pic: 'Prj.Own', tag: 'ALL', fcstStart: '2026-01-06', fcstEnd: '2026-01-10', actStart: '', actEnd: '' },
      { id: '3', group: 'NPR GATE', name: 'Asia PMR / ER Prep', pic: 'Prj.Own', tag: 'ALL', fcstStart: '2026-01-11', fcstEnd: '2026-01-12', actStart: '', actEnd: '' },
      { id: '4', group: 'NPR GATE', name: 'Asia PMR Sub / Appr', pic: 'Prj.Own', tag: 'ALL', fcstStart: '2026-01-13', fcstEnd: '2026-01-20', actStart: '', actEnd: '' },
      { id: '5', group: 'NPR GATE', name: 'ATG Project Kickoff', pic: 'Prj.Own', tag: 'ALL', fcstStart: '2026-01-21', fcstEnd: '2026-01-31', actStart: '', actEnd: '' },
      { id: '6', group: 'RECIPE COMPLIANCE', name: 'Recipe compliance', pic: 'SRA', tag: 'ALL', fcstStart: '2026-02-01', fcstEnd: '2026-02-08', actStart: '', actEnd: '' },
      { id: '7', group: 'ARTWORK DEVELOPMENT', name: 'Asia Label content sheet', pic: 'Planner', tag: 'ALL', fcstStart: '2026-02-09', fcstEnd: '2026-02-15', actStart: '', actEnd: '' },
      { id: '8', group: 'ARTWORK DEVELOPMENT', name: 'Legal text/PTS', pic: 'Planner', tag: 'ALL', fcstStart: '2026-02-16', fcstEnd: '2026-02-18', actStart: '', actEnd: '' },
      { id: '9', group: 'ARTWORK DEVELOPMENT', name: 'Provide new FG/pack code', pic: 'Planner', tag: 'ALL', fcstStart: '2026-02-16', fcstEnd: '2026-02-19', actStart: '', actEnd: '' },
      { id: '10', group: 'ARTWORK DEVELOPMENT', name: 'MAW - Artwork Dev', pic: 'Planner', tag: 'ALL', fcstStart: '2026-02-20', fcstEnd: '2026-02-25', actStart: '', actEnd: '' },
      { id: '11', group: 'ARTWORK DEVELOPMENT', name: 'Preflight and AW Release', pic: 'Planner', tag: 'ALL', fcstStart: '2026-02-26', fcstEnd: '2026-03-03', actStart: '', actEnd: '' },
      { id: '12', group: 'ARTWORK DEVELOPMENT', name: 'Release to printer', pic: 'Planner', tag: 'ALL', fcstStart: '2026-03-04', fcstEnd: '2026-03-17', actStart: '', actEnd: '' },
      { id: '13', group: 'ARTWORK DEVELOPMENT', name: '3D packshot', pic: 'Planner', tag: 'ALL', fcstStart: '2026-03-18', fcstEnd: '2026-03-20', actStart: '', actEnd: '' },
      { id: '14', group: 'ER GATE [ID]', name: 'ER preparation', pic: 'Prj.Own', tag: 'ID', fcstStart: '2026-03-21', fcstEnd: '2026-03-30', actStart: '', actEnd: '' },
      { id: '15', group: 'ER GATE [ID]', name: 'ER submission to feeder', pic: 'Prj.Own', tag: 'ID', fcstStart: '2026-03-31', fcstEnd: '2026-04-02', actStart: '', actEnd: '' },
      { id: '16', group: 'ER GATE [ID]', name: 'ER approval in feeder', pic: 'Prj.Own', tag: 'ID', fcstStart: '2026-04-03', fcstEnd: '2026-04-05', actStart: '', actEnd: '' },
      { id: '17', group: 'ER GATE [ID]', name: 'ER submission to PMR', pic: 'Prj.Own', tag: 'ID', fcstStart: '2026-04-06', fcstEnd: '2026-04-07', actStart: '', actEnd: '' },
      { id: '19', group: 'ER GATE [ID]', name: 'ER approval in MCA PMR', pic: 'Prj.Own', tag: 'ID', fcstStart: '2026-04-09', fcstEnd: '2026-04-10', actStart: '', actEnd: '' },
      { id: '20', group: 'PRODUCTION READINESS [ID]', name: 'Place order', pic: 'Planner', tag: 'ID', fcstStart: '2026-04-12', fcstEnd: '2026-04-13', actStart: '', actEnd: '' },
      { id: '21', group: 'PRODUCTION READINESS [ID]', name: 'Packaging ordering', pic: 'Planner', tag: 'ID', fcstStart: '2026-04-14', fcstEnd: '2026-04-18', actStart: '', actEnd: '' },
      { id: '22', group: 'PRODUCTION READINESS [ID]', name: 'First Production', pic: 'Planner', tag: 'ID', fcstStart: '2026-04-19', fcstEnd: '2026-04-21', actStart: '', actEnd: '' },
      { id: '23', group: 'MARKET SHIPMENT TO RFO [ID]', name: 'Shipment (ETD to ETA)', pic: 'Src.Unit', tag: 'ID', fcstStart: '2026-04-22', fcstEnd: '2026-04-25', actStart: '', actEnd: '' },
      { id: '24', group: 'MARKET SHIPMENT TO RFO [ID]', name: 'Custom Clearance', pic: 'Src.Unit', tag: 'ID', fcstStart: '2026-04-26', fcstEnd: '2026-05-02', actStart: '', actEnd: '' },
      { id: '25', group: 'MARKET SHIPMENT TO RFO [ID]', name: 'Ready for order', pic: 'Src.Unit', tag: 'ID', fcstStart: '2026-05-03', fcstEnd: '2026-05-06', actStart: '', actEnd: '' },
      { id: '26', group: 'PRODUCTION READINESS [TH]', name: 'Place order', pic: 'Planner', tag: 'TH', fcstStart: '2026-04-12', fcstEnd: '2026-04-15', actStart: '', actEnd: '' },
      { id: '28', group: 'PRODUCTION READINESS [TH]', name: 'First Production', pic: 'Planner', tag: 'TH', fcstStart: '2026-04-21', fcstEnd: '2026-04-28', actStart: '', actEnd: '' },
      { id: '31', group: 'MARKET SHIPMENT TO RFO [TH]', name: 'Ready for order', pic: 'Src.Unit', tag: 'TH', fcstStart: '2026-05-06', fcstEnd: '2026-05-08', actStart: '', actEnd: '' },
      { id: '32', group: 'PRODUCTION READINESS [MY, SG, VN]', name: 'Place order', pic: 'Planner', tag: 'MY, SG, VN', fcstStart: '2026-04-12', fcstEnd: '2026-04-13', actStart: '', actEnd: '' },
      { id: '35', group: 'MARKET SHIPMENT [MY, SG, VN]', name: 'Shipment (ETD to ETA)', pic: 'Src.Unit', tag: 'MY, SG, VN', fcstStart: '2026-04-22', fcstEnd: '2026-04-25', actStart: '', actEnd: '' },
      { id: '37', group: 'MARKET SHIPMENT [MY, SG, VN]', name: 'Ready for order', pic: 'Src.Unit', tag: 'MY, SG, VN', fcstStart: '2026-04-28', fcstEnd: '2026-04-29', actStart: '', actEnd: '' }
    ];

    let currentTasks = JSON.parse(JSON.stringify(INITIAL_TASKS)); // Clone data

    // 2. Vanilla JS Date Helpers (Replaces date-fns)
    const parseDate = (s) => s ? new Date(s + 'T00:00:00') : null;
    const diffDays = (d1, d2) => Math.round((d1 - d2) / 86400000);
    const addDays = (d, num) => new Date(d.getTime() + num * 86400000);
    const getShortDay = (d) => ['S','M','T','W','T','F','S'][d.getDay()];

    // Core Actions
    window.updateTask = function(id, field, value) {
      const task = currentTasks.find(t => t.id === id);
      if (task) {
        task[field] = value;
        render();
      }
    };

    function getFilteredTasks() {
      const m = document.getElementById('marketFilter').value;
      return currentTasks.filter(t => m === 'ALL' || t.tag === 'ALL' || t.tag.includes(m));
    }

    // 3. Render Engine
    function render() {
      const tasks = getFilteredTasks();
      
      // Calculate Analytics
      let estTotal = 0, actTotal = 0;
      tasks.forEach(t => {
        const fs = parseDate(t.fcstStart), fe = parseDate(t.fcstEnd);
        const as = parseDate(t.actStart), ae = parseDate(t.actEnd);
        if (fs && fe) estTotal += diffDays(fe, fs);
        if (as && ae) actTotal += diffDays(ae, as);
      });

      // Update Analytics UI
      const isDelayed = actTotal > estTotal;
      document.getElementById('analytics').innerHTML = `
        <div class="flex-1 rounded-xl border border-slate-200 p-5 bg-slate-50 flex flex-col items-center justify-center transition-all">
          <div class="text-xs font-bold text-slate-500 uppercase tracking-widest">Total Estimated Lead Time</div>
          <div class="text-3xl font-bold mt-1 text-slate-800">${estTotal} <span class="text-lg opacity-50">Days</span></div>
        </div>
        <div class="flex-1 rounded-xl border ${isDelayed ? 'bg-red-50 text-red-800 border-red-200 shadow-[0_0_15px_rgba(239,68,68,0.1)]' : 'bg-slate-50 text-slate-800 border-slate-200'} p-5 flex flex-col items-center justify-center transition-all">
          <div class="text-xs font-bold uppercase tracking-widest ${isDelayed ? 'text-red-600' : 'text-slate-500'}">Total Actual Lead Time</div>
          <div class="text-3xl font-bold mt-1">${actTotal} <span class="text-lg opacity-50">Days</span></div>
        </div>
      `;

      // Calculate Timeline Bounds
      let minDate = new Date('2030-01-01'), maxDate = new Date('2000-01-01');
      tasks.forEach(t => {
        [t.fcstStart, t.fcstEnd, t.actStart, t.actEnd].forEach(ds => {
           if (ds) {
             const d = parseDate(ds);
             if (d < minDate) minDate = d;
             if (d > maxDate) maxDate = d;
           }
        });
      });
      
      if (minDate > maxDate) { minDate = new Date(); maxDate = addDays(new Date(), 30); }
      const startTimeline = addDays(minDate, -minDate.getDay() - 3); // Start slightly before
      const endTimeline = addDays(maxDate, 14); // Buffer at end
      const totalDays = diffDays(endTimeline, startTimeline) + 1;
      const dayWidth = 28; // Pixels per day

      // Group tasks
      const grouped = {};
      tasks.forEach(t => {
         if(!grouped[t.group]) grouped[t.group] = [];
         grouped[t.group].push(t);
      });

      // Build Table Pane UI
      let tableHtml = `<div class="sticky left-0 bg-white z-40 shadow-[2px_0_10px_rgba(0,0,0,0.05)] border-r border-slate-200 flex flex-col w-[600px] shrink-0">`;
      tableHtml += `
        <div class="h-10 bg-slate-50 text-[10px] font-bold uppercase text-slate-500 flex items-center border-b border-slate-200 shrink-0 sticky top-0 z-50">
           <div class="table-cell col-name">Task Description</div>
           <div class="table-cell col-pic">PIC</div>
           <div class="table-cell col-market">Market</div>
           <div class="table-cell col-date">Fcst Start</div>
           <div class="table-cell col-date">Fcst End</div>
           <div class="table-cell col-date">Act Start</div>
           <div class="table-cell col-date text-slate-800">Act End</div>
        </div>
      `;

      // Build Gantt Pane UI
      let ganttHtml = `<div class="relative flex flex-col" style="width: ${totalDays * dayWidth}px;">`;
      ganttHtml += `<div class="h-10 bg-slate-50 flex border-b border-slate-200 shrink-0 sticky top-0 z-30">`;
      for(let i=0; i<totalDays; i++) {
         const d = addDays(startTimeline, i);
         const isWeekend = d.getDay() === 0 || d.getDay() === 6;
         ganttHtml += `
           <div class="flex flex-col items-center justify-end text-[10px] pb-1 border-r border-slate-200 shrink-0 ${isWeekend ? 'bg-slate-200/50 text-slate-400' : 'text-slate-600'}" style="width: ${dayWidth}px">
             <span class="opacity-50">${getShortDay(d)}</span>
             <span class="font-medium">${d.getDate()}</span>
           </div>`;
      }
      ganttHtml += `</div>`;
      ganttHtml += `<div class="absolute inset-0 gantt-grid pointer-events-none z-0 mt-10"></div>`; // Grid lines

      // Map rows
      Object.keys(grouped).forEach(gName => {
         tableHtml += `<div class="group-header sticky left-0 z-40">${gName}</div>`;
         ganttHtml += `<div class="h-[38px] border-b border-slate-200 bg-slate-100/40 shrink-0 flex items-center"></div>`;

         grouped[gName].forEach(t => {
            // TABLE ROW -> Updates state on input change natively via inline functions!
            tableHtml += `
              <div class="task-row shrink-0 bg-white hover:bg-slate-50 w-full group">
                <div class="table-cell col-name font-medium pl-4"><input class="input-clean" value="${t.name}" onchange="updateTask('${t.id}', 'name', this.value)"></div>
                <div class="table-cell col-pic"><input class="input-clean bg-blue-50 text-blue-800 text-center rounded px-1 text-[10px] uppercase font-bold" value="${t.pic}" onchange="updateTask('${t.id}', 'pic', this.value)"></div>
                <div class="table-cell col-market"><span class="bg-indigo-50 text-indigo-600 rounded px-1.5 py-0.5 text-[10px] uppercase font-bold tracking-wide">${t.tag}</span></div>
                <div class="table-cell col-date relative text-slate-400"><input type="date" class="input-clean date-input relative z-10" value="${t.fcstStart}" onchange="updateTask('${t.id}', 'fcstStart', this.value)"></div>
                <div class="table-cell col-date relative text-slate-400"><input type="date" class="input-clean date-input relative z-10" value="${t.fcstEnd}" onchange="updateTask('${t.id}', 'fcstEnd', this.value)"></div>
                <div class="table-cell col-date relative"><input type="date" class="input-clean date-input relative z-10 text-slate-700 font-medium" value="${t.actStart}" onchange="updateTask('${t.id}', 'actStart', this.value)"></div>
                <div class="table-cell col-date relative"><input type="date" class="input-clean date-input relative z-10 text-slate-700 font-medium" value="${t.actEnd}" onchange="updateTask('${t.id}', 'actEnd', this.value)"></div>
              </div>
            `;

            // GANTT ROW
            ganttHtml += `<div class="task-row shrink-0 relative flex items-center bg-transparent hover:bg-slate-50/50 w-full border-b border-slate-100/50">`;
            
            // Forecast Bar (Outlined / Light)
            if(t.fcstStart && t.fcstEnd) {
               const s = parseDate(t.fcstStart), e = parseDate(t.fcstEnd);
               if(s <= e) {
                 const left = diffDays(s, startTimeline) * dayWidth;
                 const width = (diffDays(e, s) + 1) * dayWidth;
                 ganttHtml += `<div class="absolute top-[8px] h-[10px] rounded border-2 border-blue-400 bg-white hover:-translate-y-[1px] transition-transform shadow-sm" style="left:${left}px; width:${width}px;" title="FCST: ${t.fcstStart} to ${t.fcstEnd}"></div>`;
               }
            }
            // Actual Bar (Solid / Dark)
            if(t.actStart && t.actEnd) {
               const s = parseDate(t.actStart), e = parseDate(t.actEnd);
               if(s <= e) {
                 const left = diffDays(s, startTimeline) * dayWidth;
                 const width = (diffDays(e, s) + 1) * dayWidth;
                 ganttHtml += `<div class="absolute bottom-[8px] h-[12px] rounded bg-blue-600 hover:translate-y-[1px] transition-transform shadow-sm cursor-pointer z-10" style="left:${left}px; width:${width}px;" title="ACT: ${t.actStart} to ${t.actEnd}"></div>`;
               }
            }
            ganttHtml += `</div>`;
         });
      });

      tableHtml += `</div>`;
      ganttHtml += `</div>`;

      document.getElementById('app-container').innerHTML = tableHtml + ganttHtml;
    }

    // Initialize the app immediately
    window.onload = render;
  </script>
</body>
</html>
